<section id="guia" class="analisador-container">
    <h2>Analisador de Links Suspeitos</h2>
    <p>Recebeu um link duvidoso nas redes sociais ou WhatsApp? Cole ele abaixo para analisar possíveis sinais de golpe ou desinformação com IA.</p>
    
    <div class="input-group">
        <input type="text" id="url-input" placeholder="Cole o link aqui (ex: http://promocao-gratis-ia.com)...">
        <button onclick="analisarLink()">Analisar Link</button>
    </div>

    <div id="loading" class="loading-box" style="display: none;">
        <div class="spinner"></div>
        <p id="loading-text">Iniciando varredura heurística...</p>
    </div>

    <div id="resultado" class="resultado-box" style="display: none;">
        <h3 id="resultado-titulo">Resultado da Análise</h3>
        <p id="resultado-status"></p>
        <div class="alertas-lista">
            <h4>Pontos Analisados:</h4>
            <ul id="lista-alertas"></ul>
        </div>
    </div>
</section>
